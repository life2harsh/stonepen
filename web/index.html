<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stonepen</title>
  <meta name="description" content="Stonepen — vector handwriting engine. Capture ink as editable vector strokes.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <span id="app-title">Stonepen</span>
      <div id="tool-group">
        <button id="btn-pen" class="tool-btn active" data-tool="pen">Pen</button>
        <button id="btn-pencil" class="tool-btn" data-tool="pencil">Pencil</button>
        <button id="btn-highlighter" class="tool-btn" data-tool="highlighter">Highlighter</button>
        <button id="btn-eraser" class="tool-btn" data-tool="eraser">Eraser</button>
        <button id="btn-lasso" class="tool-btn" data-tool="lasso">Lasso</button>
        <button id="btn-pan" class="tool-btn" data-tool="pan">Pan</button>
        <button id="btn-select" class="tool-btn" data-tool="select">Select</button>
      </div>
      <div id="brush-group">
        <label for="width-slider">Width</label>
        <input id="width-slider" type="range" min="0.5" max="48" step="0.5" value="3">
        <input id="color-picker" type="color" value="#000000" title="Brush color">
      </div>
      <div id="action-group">
        <button id="btn-undo">Undo</button>
        <button id="btn-redo">Redo</button>
        <button id="btn-clear">Clear</button>
        <button id="btn-save">Save</button>
        <button id="btn-load">Load</button>
        <input id="load-input" type="file" accept=".json" style="display:none">
        <button id="btn-export-svg">Export SVG</button>
        <button id="btn-export-png">Export PNG</button>
        <button id="btn-settings">Settings</button>
      </div>
    </header>
    <main id="canvas-container">
      <canvas id="ink-canvas" tabindex="0"></canvas>
      <div id="selection-bar" class="hidden">
        <span id="sel-info-text">1 item selected</span>
        <div class="v-divider"></div>
        <div class="sel-btn-group">
          <button id="btn-sel-bring-forward" title="Bring Forward">Forward</button>
          <button id="btn-sel-send-backward" title="Send Backward">Backward</button>
          <button id="btn-sel-bring-to-front" title="Bring to Front">To Front</button>
          <button id="btn-sel-send-to-back" title="Send to Back">To Back</button>
        </div>
        <div class="v-divider"></div>
        <div class="sel-btn-group">
          <button id="btn-sel-copy" title="Copy (Ctrl+C)">Copy</button>
          <button id="btn-sel-cut" title="Cut (Ctrl+X)">Cut</button>
          <button id="btn-sel-duplicate" title="Duplicate (Ctrl+D)">Duplicate</button>
          <button id="btn-sel-delete" title="Delete (Del)">Delete</button>
        </div>
        <div id="sel-style-section" class="hidden">
          <div class="v-divider"></div>
          <label for="sel-width-slider">Width</label>
          <div class="slider-wrapper">
            <input id="sel-width-slider" type="range" min="0.5" max="48" step="0.5" value="3">
            <span id="sel-width-mixed" class="mixed-badge hidden">mixed</span>
          </div>
          <div class="color-wrapper">
            <input id="sel-color-picker" type="color" value="#000000" title="Selection color">
            <span id="sel-color-mixed" class="mixed-badge hidden">mixed</span>
          </div>
        </div>
      </div>
    </main>
    <footer id="status-bar">strokes: 0  selected: 0  tool: Pen  zoom: 100%  saved</footer>
  </div>

  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="btn-settings-close" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <h3>Keyboard Shortcuts</h3>
        <div id="shortcuts-table-container"></div>
        <div id="capture-overlay" class="capture-overlay hidden">
          <div class="capture-box">
            <p>Press shortcut chord for <span id="capture-cmd-name">Command</span>...</p>
            <p class="capture-sub">Escape to cancel</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-settings-reset" class="danger-btn">Reset to Defaults</button>
        <button id="btn-settings-close-footer" class="primary-btn">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
